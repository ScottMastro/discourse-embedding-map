en:
  site_settings:
    embedding_map_enabled: "Enable the topic map (UMAP projection of topic embeddings)."
    embedding_map_min_trust_level: "Minimum trust level required to view the topic map. Set to -1 to allow anonymous visitors."
    embedding_map_umap_n_neighbors: "UMAP n_neighbors parameter. Higher values emphasize global structure; lower values preserve local clustering."
    embedding_map_umap_min_dist: "UMAP min_dist parameter. Lower values yield tighter, more defined clusters."
    embedding_map_max_points: "Maximum number of topics projected. The most recent topics are selected when the forum exceeds this limit."
    embedding_map_min_cluster_size: "HDBSCAN minimum cluster size. Lower values produce more, smaller clusters; higher values produce fewer, larger clusters."
    embedding_map_min_supercluster_size: "HDBSCAN minimum cluster size for the second supercluster pass. Much larger than the cluster setting; produces a handful of broad topical regions."
